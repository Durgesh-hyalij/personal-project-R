<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project-R | Clinical Report View</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; color: #333; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .patient-card { background: #eef6ff; padding: 20px; border-radius: 8px; border-left: 5px solid #007bff; margin-bottom: 30px; }
        .report-item { border: 1px solid #eee; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .ai-summary { background: #fafafa; padding: 15px; border-radius: 5px; border: 1px inset #eee; }
        .date { font-size: 0.8em; color: #888; }
        .error { color: red; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1 style="text-align: center;">Medical Analysis Report</h1>
        <div id="loading">Loading clinical data...</div>
        
        <div id="content" style="display: none;">
            <div class="patient-card">
                <h2 id="p-name" style="margin:0;"></h2>
                <p id="p-email" style="margin:5px 0;"></p>
                <small>Link Expires: <span id="expiry"></span></small>
            </div>

            <h3>Extracted Reports</h3>
            <div id="reports-list"></div>
        </div>
    </div>

    <script>
        async function loadData() {
            // This gets the token directly from the URL (e.g., /doctor-report/ABC)
            const pathParts = window.location.pathname.split('/');
            const token = pathParts[pathParts.length - 1];

            try {
                // We fetch from the /doctor-view API route
                const response = await fetch(`/doctor-view/${token}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('p-name').innerText = data.patient.username;
                    document.getElementById('p-email').innerText = data.patient.email;
                    document.getElementById('expiry').innerText = data.expires_at;

                    const list = document.getElementById('reports-list');
                    data.reports.forEach(report => {
                        const div = document.createElement('div');
                        div.className = 'report-item';
                        div.innerHTML = `
                            <div class="date">Generated: ${report.created_at}</div>
                            <div class="ai-summary">${marked.parse(report.ai_summary)}</div>
                            <details style="margin-top:10px;">
                                <summary style="cursor:pointer; color:#007bff;">View Original Text</summary>
                                <pre style="white-space: pre-wrap; font-size: 0.85em; background:#fff; padding:10px;">${report.extracted_text}</pre>
                            </details>
                        `;
                        list.appendChild(div);
                    });

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    document.getElementById('app').innerHTML = `<p class="error">${data.error}</p>`;
                }
            } catch (err) {
                document.getElementById('app').innerHTML = `<p class="error">Server Connection Failed. Is Flask running?</p>`;
            }
        }

        loadData();
    </script>
</body>
</html>
