<!DOCTYPE html>
<html>
<head>
    <title>Health Trends</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        h2 {
            font-weight: 700;
            color: #0f172a;
        }

        /* ===== KPI SECTION ===== */

        .kpi-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            flex: 1;
            padding: 25px;
            border-radius: 18px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 45px rgba(0,0,0,0.12);
        }

        .kpi-card h5 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #64748b;
        }

        .kpi-card span {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
            display: block;
            margin-top: 8px;
        }

        /* ===== Trend Container Card ===== */

        #trendContainer {
            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            padding: 30px !important;
        }

        /* ===== Chart Cards ===== */

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            height: 400px;
        }

        .chart-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
        }

        .chart-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 55px rgba(0,0,0,0.12);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h4 {
            margin: 0;
            font-weight: 600;
            font-size: 18px;
            color: #0f172a;
        }

        /* ===== Trend Badges ===== */

        .trend-badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .trend-badge.improved {
            background: rgba(30,136,229,0.15);
            color: #1e88e5;
        }

        .trend-badge.worsened {
            background: rgba(229,57,53,0.15);
            color: #e53935;
        }

        .trend-badge.stable {
            background: rgba(67,160,71,0.15);
            color: #43a047;
        }

        canvas {
            height: 320px !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kpi-row {
                flex-direction: column;
            }
        }

    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">📊 Health Trends Dashboard</h2>

    <!-- KPI SECTION -->
    <div class="kpi-row">
        <div class="kpi-card">
            <h5>Total Reports</h5>
            <span id="totalReports">0</span>
        </div>
        <div class="kpi-card">
            <h5>Tracked Metrics</h5>
            <span id="totalMetrics">0</span>
        </div>
    </div>

    <div id="trendContainer" class="card shadow-sm p-3">
        <div id="charts-container"></div>
    </div>

</div>

<script>
const token = localStorage.getItem("token");

async function loadCharts() {
    try {
        const response = await fetch("/api/compare-metrics", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const data = await response.json();

        if (!data.success) {
            alert("Failed to load data");
            return;
        }

        const comparison = data.comparison;
        const container = document.getElementById("charts-container");
        container.innerHTML = "";

        const firstMetric = Object.values(comparison)[0];

        document.getElementById("totalReports").innerText =
            firstMetric ? firstMetric.values.length : 0;

        document.getElementById("totalMetrics").innerText =
            Object.keys(comparison).length;

        for (const metricName in comparison) {

            const metricData = comparison[metricName];

            const dates = metricData.values.map(v => v.date);
            const values = metricData.values.map(v => v.value);

            let borderColor = "#43a047";

            if (metricData.trend === "Worsened")
                borderColor = "#e53935";
            if (metricData.trend === "Improved")
                borderColor = "#1e88e5";

            const chartCard = document.createElement("div");
            chartCard.className = "chart-card";

            chartCard.innerHTML = `
                <div class="chart-header">
                    <h4>${metricName}</h4>
                    <span class="trend-badge ${metricData.trend.toLowerCase()}">
                        ${metricData.trend}
                    </span>
                </div>
            `;

            const canvas = document.createElement("canvas");
            chartCard.appendChild(canvas);
            container.appendChild(chartCard);

            new Chart(canvas, {
                type: "line",
                data: {
                    labels: dates,
                    datasets: [{
                        label: metricName,
                        data: values,
                        borderColor: borderColor,
                        backgroundColor: borderColor + "20",
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: "#ffffff",
                        pointBorderColor: borderColor,
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1200,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: "#0f172a",
                            titleColor: "#ffffff",
                            bodyColor: "#ffffff",
                            padding: 12,
                            cornerRadius: 10
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: "#e2e8f0" },
                            ticks: { color: "#64748b" }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: "#64748b" }
                        }
                    }
                }
            });
        }

    } catch (error) {
        console.error("Chart load error:", error);
    }
}

loadCharts();
</script>

</body>
</html>
